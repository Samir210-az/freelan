<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elan — Freelan.az</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="app-header"></header>

<div class="container">
  <div class="jd-grid" id="jd-wrap">
    <div class="empty" style="grid-column:1/-1;"><div class="ico">⏳</div><p>Yüklənir...</p></div>
  </div>
</div>

<footer id="app-footer"></footer>

<script type="module" src="js/app.js"></script>
<script type="module">
const jobId = new URLSearchParams(location.search).get('id');
let job = null;

document.addEventListener('fb-ready', load);
document.addEventListener('bid-sent', load);

let loading = false;
async function load() {
  if (loading) return; loading = true;
  if (!jobId) { renderError('Elan tapılmadı'); loading = false; return; }
  const { db, doc, getDoc, getDocs, collection, query, where } = FB;
  try {
    const snap = await getDoc(doc(db, 'jobs', jobId));
    if (!snap.exists()) { renderError('Bu elan mövcud deyil və ya silinib'); loading = false; return; }
    job = { id: snap.id, ...snap.data() };
    document.title = job.title + ' — Freelan.az';

    // Load bids
    let bids = [];
    try {
      const bs = await getDocs(query(collection(db, 'bids'), where('jobId', '==', jobId)));
      bs.forEach(d => bids.push({ id: d.id, ...d.data() }));
      bids.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    } catch(e) {}

    render(bids);
  } catch(e) {
    renderError('Xəta: ' + e.message);
  }
  loading = false;
}

function renderError(msg) {
  document.getElementById('jd-wrap').innerHTML =
    `<div class="empty" style="grid-column:1/-1;"><div class="ico">😕</div><p>${esc(msg)}</p>
     <a class="btn btn-green btn-sm" style="margin-top:14px;" href="jobs.html">← Tapşırıqlara qayıt</a></div>`;
}

function statusBadge(s) {
  return s === 'approved' ? '<span class="badge badge-green">Açıq</span>'
       : s === 'in_progress' ? '<span class="badge badge-blue">Davam edir</span>'
       : s === 'pending' ? '<span class="badge badge-orange">Moderasiyada</span>'
       : s === 'completed' ? '<span class="badge badge-gray">Tamamlanıb</span>'
       : '<span class="badge badge-gray">—</span>';
}

function render(bids) {
  const isOwner = FB.user && FB.user.uid === job.clientId;
  const isAdmin = FB.userData?.role === 'admin';
  const myBid = FB.user ? bids.find(b => b.freelancerId === FB.user.uid) : null;

  document.getElementById('jd-wrap').innerHTML = `
  <div>
    <div class="jd-card">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;">
        <h1 style="font-size:24px;line-height:1.3;">${esc(job.title)}</h1>
        ${statusBadge(job.status)}
      </div>
      <div class="job-meta" style="margin:12px 0 18px;">
        <span>📁 ${esc(job.category)}</span>
        <span>🕐 ${timeAgo(job.createdAt)}</span>
        <span>💬 ${bids.length} təklif</span>
      </div>
      <h3 style="font-size:15px;margin-bottom:8px;">Təsvir</h3>
      <p style="font-size:14.5px;color:var(--ink2);line-height:1.7;white-space:pre-wrap;">${esc(job.description)}</p>
    </div>

    <div class="jd-card" style="margin-top:18px;">
      <h3 style="font-size:17px;margin-bottom:16px;">Təkliflər (${bids.length})</h3>
      <div id="bids-area">
        ${bids.length === 0
          ? '<div class="empty"><div class="ico">🚀</div><p>Hələ təklif yoxdur — ilk sən ol!</p></div>'
          : bids.map(b => bidHtml(b, isOwner)).join('')}
      </div>
    </div>
  </div>

  <div class="jd-side">
    <div class="jd-card">
      <div class="jd-price">₼${esc(job.budget)}</div>
      <div style="font-size:12px;color:var(--ink3);margin-bottom:16px;">Sabit qiymət</div>
      ${myBid
        ? `<div class="ok-box" style="display:block;">✅ Təklifiniz göndərilib: <b>₼${myBid.amount}</b>${myBid.status==='accepted'?' — Qəbul edildi! 🎉':''}</div>`
        : (!isOwner && !isAdmin && job.status === 'approved')
          ? `<button class="btn btn-green" style="width:100%;" onclick="openBid('${job.id}','${esc(job.title)}')">Təklif göndər →</button>`
          : ''}
      ${isOwner ? '<p style="font-size:12.5px;color:var(--ink3);text-align:center;">Bu sizin elanınızdır</p>' : ''}
      <div style="margin-top:16px;">
        <div class="info-row"><span>Kateqoriya</span><strong>${esc(job.category)}</strong></div>
        <div class="info-row"><span>Müddət</span><strong>${esc(job.deadline)} gün</strong></div>
        <div class="info-row"><span>Təkliflər</span><strong>${bids.length}</strong></div>
        <div class="info-row"><span>Yerləşdirilib</span><strong>${timeAgo(job.createdAt)}</strong></div>
      </div>
    </div>
    <div class="jd-card">
      <h4 style="font-size:13px;margin-bottom:12px;color:var(--ink2);">MÜŞTƏRİ</h4>
      <div style="display:flex;align-items:center;gap:11px;">
        <div class="avatar" style="width:42px;height:42px;font-size:16px;">${esc((job.clientName||'?')[0].toUpperCase())}</div>
        <div style="font-weight:700;font-size:14.5px;">${esc(job.clientName||'Müştəri')}</div>
      </div>
    </div>
  </div>`;
}

function bidHtml(b, isOwner) {
  return `
  <div class="prop-item">
    <div class="prop-head">
      <div style="display:flex;gap:11px;align-items:center;">
        <div class="avatar">${esc((b.freelancerName||'?')[0].toUpperCase())}</div>
        <div>
          <div class="prop-name">${esc(b.freelancerName)}</div>
          <div class="prop-meta">${esc(b.freelancerTitle||'Freelancer')} · ⭐ ${b.freelancerRating > 0 ? b.freelancerRating.toFixed(1) : 'Yeni'} · ⏱ ${b.days} gün</div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="prop-amount">₼${b.amount}</div>
        ${b.status === 'accepted'
          ? '<span class="badge badge-green" style="margin-top:4px;">✅ Qəbul edildi</span>'
          : (isOwner && job.status === 'approved')
            ? `<button class="btn btn-green btn-sm" style="margin-top:6px;" onclick="acceptBid('${b.id}','${b.freelancerId}')">Qəbul et</button>`
            : ''}
      </div>
    </div>
    <p class="prop-cover">${esc(b.cover)}</p>
  </div>`;
}

window.acceptBid = async function(bidId, freelancerId) {
  if (!confirm('Bu təklifi qəbul etmək istəyirsiniz? İş bu freelancerə tapşırılacaq.')) return;
  const { db, doc, updateDoc } = FB;
  try {
    await updateDoc(doc(db, 'bids', bidId), { status: 'accepted' });
    await updateDoc(doc(db, 'jobs', jobId), { status: 'in_progress', assignedTo: freelancerId });
    showToast('Təklif qəbul edildi! İş başlayır 🎉');
    load();
  } catch(e) { showToast('Xəta: ' + e.message); }
};
</script>
</body>
</html>
