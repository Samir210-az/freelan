<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elan — Freelan.az</title>
<meta name="description" content="Freelance tapşırığın detalları — büdcə, müddət, təkliflər.">
<meta name="theme-color" content="#0d1f12">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<script>try{var th=localStorage.getItem("theme");if(!th&&window.matchMedia&&matchMedia("(prefers-color-scheme:dark)").matches)th="dark";if(th)document.documentElement.setAttribute("data-theme",th);}catch(e){}</script>
<link rel="stylesheet" href="css/style.css?v=5">
<style>
.action-box{border-radius:12px;padding:16px;margin-top:14px;font-size:14px;}
.action-box.blue{background:rgba(31,87,195,0.08);border:1px solid rgba(31,87,195,0.2);}
.action-box.green{background:rgba(20,160,0,0.08);border:1px solid rgba(20,160,0,0.2);}
.action-box.orange{background:rgba(217,151,6,0.08);border:1px solid rgba(217,151,6,0.2);}
.action-box.red{background:rgba(210,50,50,0.08);border:1px solid rgba(210,50,50,0.2);}
.action-box p{margin:0 0 10px;color:var(--ink2);line-height:1.5;}
.action-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.work-link-box{display:flex;gap:8px;margin:10px 0;}
.work-link-box input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--ink);font-size:13.5px;}
.delivered-link{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:13.5px;color:var(--green);text-decoration:none;margin-top:8px;word-break:break-all;}
.delivered-link:hover{background:var(--bg2);}
.dispute-chat{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;padding:4px 0;}
.dc-msg{padding:10px 13px;border-radius:10px;font-size:13.5px;line-height:1.5;max-width:90%;}
.dc-msg.admin-msg{background:rgba(210,50,50,0.1);border:1px solid rgba(210,50,50,0.2);align-self:center;max-width:100%;text-align:center;}
.dc-msg.mine{background:var(--green);color:#fff;align-self:flex-end;}
.dc-msg.other{background:var(--card);border:1px solid var(--border);align-self:flex-start;}
.dc-meta{font-size:11px;opacity:0.7;margin-top:3px;}
.dc-input-row{display:flex;gap:8px;margin-top:10px;}
.dc-input-row input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--ink);font-size:13.5px;}
.btn-danger{background:#d23232;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;}
.btn-danger:hover{background:#b52020;}
/* Ulduz reytinq */
.star-row{display:flex;gap:6px;margin:10px 0;}
.star-btn{font-size:28px;cursor:pointer;background:none;border:none;padding:0;line-height:1;transition:transform .1s;}
.star-btn:hover{transform:scale(1.2);}
.star-btn.active{filter:drop-shadow(0 0 4px gold);}
.review-textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--ink);font-size:13.5px;resize:vertical;min-height:80px;margin-top:8px;box-sizing:border-box;}
</style>
</head>
<body>
<header id="app-header"></header>
<div class="container">
  <div class="jd-grid" id="jd-wrap">
    <div class="empty" style="grid-column:1/-1;"><div class="ico">&#x23F3;</div><p>Yuklenir...</p></div>
  </div>
</div>
<footer id="app-footer"></footer>
<script type="module" src="js/app.js?v=9"></script>
<script type="module">
import {
  onSnapshot, orderBy, query as fsQuery,
  collection as fsCol, addDoc as fsAdd,
  serverTimestamp as fsST
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const jobId = new URLSearchParams(location.search).get('id');
let job = null;
let unsubDispute = null;
let selectedStars = 0;

document.addEventListener('fb-ready', load);
document.addEventListener('bid-sent', load);

let loading = false;
async function load() {
  if (loading) return; loading = true;
  if (!jobId) { renderError(t('jd_nf')); loading = false; return; }
  const { db, doc, getDoc, getDocs, collection, query, where } = FB;
  try {
    const snap = await getDoc(doc(db, 'jobs', jobId));
    if (!snap.exists()) { renderError(t('jd_nf')); loading = false; return; }
    job = { id: snap.id, ...snap.data() };
    document.title = job.title + ' — Freelan.az';
    let bids = [];
    try {
      const bs = await getDocs(query(collection(db, 'bids'), where('jobId','==',jobId)));
      bs.forEach(d => bids.push({ id: d.id, ...d.data() }));
      bids.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    } catch(e){}
    render(bids);
    if (job.status === 'disputed') subscribeDispute();
  } catch(e){ renderError('Xeta: ' + e.message); }
  loading = false;
}

function renderError(msg) {
  document.getElementById('jd-wrap').innerHTML =
    '<div class="empty" style="grid-column:1/-1;"><div class="ico">&#x1F615;</div><p>' + esc(msg) + '</p>'
    + '<a class="btn btn-green btn-sm" style="margin-top:14px;" href="jobs.html">' + t('jd_back') + '</a></div>';
}

function statusBadge(s) {
  if (s==='approved')    return '<span class="badge badge-green">'  + t('st_open')     + '</span>';
  if (s==='in_progress') return '<span class="badge badge-blue">'   + t('st_progress') + '</span>';
  if (s==='pending')     return '<span class="badge badge-orange">' + t('st_pending')  + '</span>';
  if (s==='submitted')   return '<span class="badge badge-orange">Tesdiq gozlenir</span>';
  if (s==='completed')   return '<span class="badge badge-gray">'   + t('st_done')     + '</span>';
  if (s==='disputed')    return '<span class="badge badge-red">Mubahise</span>';
  if (s==='cancelled')   return '<span class="badge badge-red">Ipttal</span>';
  return '<span class="badge badge-gray">—</span>';
}

function actionBox() {
  if (!FB.user || !job) return '';
  const uid = FB.user.uid;
  const isOwner    = uid === job.clientId;
  const isAssigned = uid === job.assignedTo;
  const isAdmin    = FB.userData?.role === 'admin';

  // FREELANCER: ishi tamamladim + link
  if (isAssigned && job.status === 'in_progress') {
    return '<div class="action-box blue">'
      + '<p>&#x1F4E6; Siz bu isi icra edirsiniz. Isi bitirdikden sonra Google Drive, Dropbox ve ya basqa link elave edib basin.</p>'
      + '<div class="work-link-box">'
      + '<input type="url" id="work-link-input" placeholder="https://drive.google.com/... ve ya basqa link">'
      + '</div>'
      + '<small style="color:var(--ink3);">&#x2139; Link olmadan da gondere bilersiniz.</small>'
      + '<div class="action-btns">'
      + '<button class="btn btn-green" onclick="submitWork()">&#x2705; Isi tamamladim</button>'
      + '</div></div>';
  }

  // MUSTERİ: submitted
  if (isOwner && job.status === 'submitted') {
    const balance = parseFloat(FB.userData?.balance || 0);
    const needed  = parseFloat(job.budget || 0);
    const hasBalance = needed === 0 || balance >= needed;
    const linkHtml = job.deliverableLink
      ? '<p style="margin:8px 0 4px;font-size:13px;color:var(--ink2);">&#x1F4CE; Freelancerin göndərdiyi link:</p>'
        + '<a class="delivered-link" href="' + esc(job.deliverableLink) + '" target="_blank" rel="noopener">&#x1F517; ' + esc(job.deliverableLink) + '</a>'
      : '<p style="margin:8px 0;font-size:13px;color:var(--ink3);">Freelancer fayl linki göndərməyib. Mesaj vasitəsilə soruşa bilərsiniz.</p>';
    const balanceWarn = !hasBalance
      ? '<div style="background:rgba(217,100,0,.1);border:1px solid rgba(217,100,0,.3);border-radius:8px;padding:12px;margin:10px 0;font-size:13.5px;">'
        + '&#x26A0;&#xFE0F; <b>Balansınız kifayət deyil!</b> İşi təsdiqləmək üçün ₼' + needed + ' AZN lazımdır.<br>'
        + 'Cari balans: <b>₼' + balance.toFixed(2) + '</b><br>'
        + '<a href="dashboard.html" onclick="sessionStorage.setItem(\'openSec\',\'balance\')" style="color:var(--green);font-weight:600;">&#x1F4B3; Balansı artır →</a>'
        + '</div>'
      : '';
    return '<div class="action-box orange">'
      + '<p>&#x1F514; Freelancer işi tamamladı. Aşağıdakı linkə baxın və qərar verin.</p>'
      + linkHtml
      + balanceWarn
      + '<div class="action-btns">'
      + (hasBalance
          ? '<button class="btn btn-green" onclick="completeJob()">&#x2705; Təsdiqləyin — iş tamamlandı (₼' + needed + ')</button>'
          : '<button class="btn btn-green" disabled style="opacity:.4;cursor:not-allowed;">&#x1F512; Balansı artırın, sonra təsdiqləyin</button>')
      + '<button class="btn btn-danger" onclick="disputeJob()">&#x26A0; Mübahisə aç</button>'
      + '</div></div>';
  }

  // MUSTERİ: in_progress-de bekleyir
  if (isOwner && job.status === 'in_progress') {
    return '<div class="action-box blue"><p>&#x23F3; Freelancer is uzerinde calisir. Tamamlandiqda sizden tesdiq istenilecek.</p></div>';
  }

  // MUBAHISE - ucterefli soхbet
  if (job.status === 'disputed') {
    const canWrite = isOwner || isAssigned || isAdmin;
    return '<div class="action-box red">'
      + '<p>&#x26A0; Bu is mubahisededir. Asagida ucterefli soхbet aparila biler. Admin qerari verecek.</p>'
      + (job.deliverableLink ? '<a class="delivered-link" href="' + esc(job.deliverableLink) + '" target="_blank">&#x1F517; Is linki</a>' : '')
      + '<div class="dispute-chat" id="dispute-chat"><div style="text-align:center;color:var(--ink3);font-size:13px;padding:12px;">Yuklenir...</div></div>'
      + (canWrite
          ? '<div class="dc-input-row">'
            + '<input type="text" id="dc-input" placeholder="Fikrinizi yazin..." onkeydown="if(event.key===\'Enter\')sendDisputeMsg()">'
            + '<button class="btn btn-green btn-sm" onclick="sendDisputeMsg()">Gonder</button>'
            + (isAdmin ? '<button class="btn btn-line btn-sm" onclick="resolveDispute()">&#x2696; Hell et</button>' : '')
            + '</div>'
          : '')
      + '</div>';
  }

  // TAMAMLANDI
  if (job.status === 'completed') {
    const linkHtml = job.deliverableLink
      ? '<a class="delivered-link" href="' + esc(job.deliverableLink) + '" target="_blank" rel="noopener">&#x1F517; Is linki: ' + esc(job.deliverableLink) + '</a>'
      : '';

    // Musteri rey versin (eger vermeyibse)
    const reviewHtml = (isOwner && !job.reviewLeft)
      ? '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">'
        + '<b style="font-size:14px;">&#x2B50; Freelanceri qiymətləndirin</b>'
        + '<div class="star-row" id="star-row">'
        + [1,2,3,4,5].map(i =>
            '<button class="star-btn" id="star-'+i+'" onclick="setStar('+i+')" title="'+i+' ulduz">&#x2606;</button>'
          ).join('')
        + '</div>'
        + '<textarea class="review-textarea" id="review-text" placeholder="Rəyinizi yazin... (istege bagli)"></textarea>'
        + '<div class="action-btns">'
        + '<button class="btn btn-green" onclick="submitReview()">&#x2B50; Reyi gonder</button>'
        + '<button class="btn btn-line" onclick="skipReview()">Kec</button>'
        + '</div>'
        + '</div>'
      : (job.reviewLeft ? '<p style="margin-top:10px;font-size:13px;color:var(--ink3);">&#x2705; Reyi artiq gondermissiniz.</p>' : '');

    return '<div class="action-box green">'
      + '<p>&#x2705; Bu is ugurla tamamlandi.</p>'
      + linkHtml
      + reviewHtml
      + '</div>';
  }

  if (job.status === 'cancelled') {
    return '<div class="action-box red"><p>&#x274C; Bu is ipttal edildi.</p></div>';
  }

  return '';
}

// ===== RENDER =====
function render(bids) {
  const isOwner = FB.user && FB.user.uid === job.clientId;
  const isAdmin = FB.userData?.role === 'admin';
  const myBid = FB.user ? bids.find(b => b.freelancerId === FB.user.uid) : null;

  document.getElementById('jd-wrap').innerHTML =
  '<div>'
    + '<div class="jd-card">'
      + '<div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;">'
        + '<h1 style="font-size:24px;line-height:1.3;">' + esc(job.title) + '</h1>'
        + statusBadge(job.status)
      + '</div>'
      + '<div class="job-meta" style="margin:12px 0 18px;">'
        + '<span>&#x1F4C1; ' + esc(job.category) + '</span>'
        + '<span>&#x1F550; ' + timeAgo(job.createdAt) + '</span>'
        + '<span>&#x1F4AC; ' + bids.length + ' ' + t('offers') + '</span>'
      + '</div>'
      + '<h3 style="font-size:15px;margin-bottom:8px;">' + t('jd_desc') + '</h3>'
      + '<p style="font-size:14.5px;color:var(--ink2);line-height:1.7;white-space:pre-wrap;">' + esc(job.description) + '</p>'
      + actionBox()
    + '</div>'
    + '<div class="jd-card" style="margin-top:18px;">'
      + '<h3 style="font-size:17px;margin-bottom:16px;">' + t('jd_props') + ' (' + bids.length + ')</h3>'
      + '<div id="bids-area">'
        + (bids.length===0
            ? '<div class="empty"><div class="ico">&#x1F680;</div><p>'+t('jd_no_props')+'</p></div>'
            : bids.map(b=>bidHtml(b,isOwner)).join(''))
      + '</div>'
    + '</div>'
  + '</div>'
  + '<div class="jd-side">'
    + '<div class="jd-card">'
      + '<div class="jd-price">&#x20BC;' + Number(job.totalPrice||job.budget).toFixed(2) + '</div>'
      + (job.serviceFee ? '<div style="font-size:12px;color:var(--ink3);margin-bottom:4px;">+&#x20BC;'+Number(job.serviceFee).toFixed(2)+' xidmet haqqi</div>' : '')
      + '<div style="font-size:12px;color:var(--ink3);margin-bottom:16px;">' + t('jd_fixed') + '</div>'
      + (myBid
          ? '<div class="ok-box" style="display:block;">&#x2705; '+t('jd_bid_sent')+': <b>&#x20BC;'+myBid.amount+'</b>'+(myBid.status==='accepted'?' — '+t('st_accepted'):'')+' </div>'
          : (!isOwner && !isAdmin && job.status==='approved')
            ? '<button class="btn btn-green" style="width:100%;" onclick="openBid(\''+job.id+'\',\''+esc(job.title)+'\')">'+t('jd_send')+'</button>'
            : '')
      + (isOwner ? '<p style="font-size:12.5px;color:var(--ink3);text-align:center;">'+t('jd_yours')+'</p>' : '')
      + '<div style="margin-top:16px;">'
        + '<div class="info-row"><span>'+t('jd_cat')+'</span><strong>'+esc(job.category)+'</strong></div>'
        + '<div class="info-row"><span>'+t('jd_dur')+'</span><strong>'+esc(job.deadline)+' '+t('day_s')+'</strong></div>'
        + '<div class="info-row"><span>'+t('jd_props')+'</span><strong>'+bids.length+'</strong></div>'
        + '<div class="info-row"><span>'+t('jd_posted')+'</span><strong>'+timeAgo(job.createdAt)+'</strong></div>'
      + '</div>'
    + '</div>'
    + '<div class="jd-card">'
      + '<h4 style="font-size:13px;margin-bottom:12px;color:var(--ink2);">'+t('jd_client')+'</h4>'
      + '<div style="display:flex;align-items:center;gap:11px;">'
        + '<div class="avatar" style="width:42px;height:42px;font-size:16px;">' + esc((job.clientName||'?')[0].toUpperCase()) + '</div>'
        + '<div style="font-weight:700;font-size:14.5px;">' + esc(job.clientName||t('db_client')) + '</div>'
      + '</div>'
      + (!isOwner ? '<button class="btn btn-line btn-sm" style="width:100%;margin-top:14px;" onclick="openMessage(\''+job.clientId+'\',\''+esc(job.clientName||t('db_client'))+'\')">'+t('msg_send')+'</button>' : '')
    + '</div>'
  + '</div>';

  if (job.status === 'disputed') subscribeDispute();
}

function bidHtml(b, isOwner) {
  return '<div class="prop-item">'
    + '<div class="prop-head">'
      + '<div style="display:flex;gap:11px;align-items:center;">'
        + '<div class="avatar">' + esc((b.freelancerName||'?')[0].toUpperCase()) + '</div>'
        + '<div>'
          + '<div class="prop-name">' + esc(b.freelancerName) + ' ' + planBadge(b.freelancerPlan) + '</div>'
          + '<div class="prop-meta">' + esc(b.freelancerTitle||'Freelancer') + ' &middot; &#x2B50; ' + (b.freelancerRating>0?b.freelancerRating.toFixed(1):t('new_lbl')) + ' &middot; &#x23F1; ' + b.days + ' ' + t('day_s') + '</div>'
        + '</div>'
      + '</div>'
      + '<div style="text-align:right;">'
        + '<div class="prop-amount">&#x20BC;' + b.amount + '</div>'
        + (b.status==='accepted'
            ? '<span class="badge badge-green" style="margin-top:4px;">'+t('st_accepted')+'</span>'
            : (isOwner && job.status==='approved')
              ? '<button class="btn btn-green btn-sm" style="margin-top:6px;" onclick="acceptBid(\''+b.id+'\',\''+b.freelancerId+'\')">'+t('accept')+'</button>'
              : '')
        + (isOwner ? '<button class="btn btn-line btn-sm" style="margin-top:6px;" onclick="openMessage(\''+b.freelancerId+'\',\''+esc(b.freelancerName)+'\')">'+t('msg_btn')+'</button>' : '')
      + '</div>'
    + '</div>'
    + '<p class="prop-cover">' + esc(b.cover) + '</p>'
  + '</div>';
}

window.acceptBid = async function(bidId, freelancerId) {
  if (!confirm(t('cf_bid'))) return;
  const { db, doc, updateDoc } = FB;
  try {
    await updateDoc(doc(db,'bids',bidId), { status:'accepted' });
    await updateDoc(doc(db,'jobs',jobId), { status:'in_progress', assignedTo: freelancerId });
    showToast('Teklif qebul edildi! Is bashlayir');
    load();
  } catch(e){ showToast('Xeta: '+e.message); }
};

window.submitWork = async function() {
  const linkInput = document.getElementById('work-link-input');
  const deliverableLink = linkInput ? linkInput.value.trim() : '';
  if (!confirm('İşi tamamlandı kimi göndərmək istəyirsiniz?\nMüştəri balansını artırıb təsdiq etməlidir.')) return;
  const { db, doc, updateDoc, collection, addDoc, serverTimestamp } = FB;
  try {
    await updateDoc(doc(db,'jobs',jobId), {
      status: 'submitted',
      deliverableLink: deliverableLink || '',
      submittedAt: serverTimestamp()
    });
    await addDoc(collection(db,'notifications'), {
      toUid: job.clientId,
      type: 'work_submitted',
      jobId: jobId,
      jobTitle: job.title,
      freelancerName: FB.userData?.name || '',
      amount: job.budget || 0,
      read: false,
      createdAt: serverTimestamp()
    });
    showToast('İş müştəriyə göndərildi! Müştəri balans artırıb təsdiq etməlidir.');
    load();
  } catch(e){ showToast('Xəta: '+e.message); }
};

window.completeJob = async function() {
  const balance = parseFloat(FB.userData?.balance || 0);
  const needed  = parseFloat(job.budget || 0);
  if (needed > 0 && balance < needed) {
    showToast('❌ Balansınız kifayət deyil! Əvvəlcə ₼' + needed + ' AZN balansa artırın.');
    return;
  }
  if (!confirm('İşi təsdiqləyirsiniz?' + (needed > 0 ? ' Balansınızdan ₼' + needed + ' silinəcək.' : ''))) return;
  const { db, doc, updateDoc, collection, addDoc, serverTimestamp, getDoc } = FB;
  try {
    if (needed > 0) {
      await updateDoc(doc(db,'users', FB.user.uid), { balance: balance - needed });
      FB.userData.balance = balance - needed;
    }
    await updateDoc(doc(db,'jobs',jobId), { status:'completed', completedAt: serverTimestamp() });
    await addDoc(collection(db,'notifications'), {
      toUid: 'admin',
      type: 'job_completed',
      jobId: jobId,
      jobTitle: job.title,
      clientName: FB.userData?.name || '',
      freelancerId: job.assignedTo || '',
      amount: needed,
      read: false,
      createdAt: serverTimestamp()
    });
    showToast('✅ İş təsdiqləndi! Admin ödənişi həyata keçirəcək.');
    load();
  } catch(e){ showToast('Xəta: '+e.message); }
};

window.disputeJob = async function() {
  if (!confirm('Mubahise achmaq isteyirsiniz?\nAdmin arasiya girecek.')) return;
  const { db, doc, updateDoc } = FB;
  try {
    await updateDoc(doc(db,'jobs',jobId), { status:'disputed' });
    showToast('Mubahise achildi. Admin elaqe saxlayacaq.');
    load();
  } catch(e){ showToast('Xeta: '+e.message); }
};

// ===== ULDUZ SECIMI =====
window.setStar = function(n) {
  selectedStars = n;
  for (let i = 1; i <= 5; i++) {
    const btn = document.getElementById('star-' + i);
    if (btn) {
      btn.innerHTML = i <= n ? '&#x2605;' : '&#x2606;';
      btn.style.color = i <= n ? '#f5a623' : '';
    }
  }
};

// ===== REY GONDER =====
window.submitReview = async function() {
  if (!selectedStars) { showToast('Ulduz secin!'); return; }
  const text = document.getElementById('review-text')?.value.trim() || '';
  const { db, doc, updateDoc, collection, addDoc, getDoc, serverTimestamp } = FB;
  try {
    // Reviews koleksiyasina yaz
    await addDoc(collection(db, 'reviews'), {
      jobId,
      clientId: FB.user.uid,
      clientName: FB.userData?.name || FB.user.email.split('@')[0],
      freelancerId: job.assignedTo,
      rating: selectedStars,
      text,
      createdAt: serverTimestamp()
    });

    // Freelancerin ortalam reytingini yenile
    if (job.assignedTo) {
      const fSnap = await getDoc(doc(db, 'users', job.assignedTo));
      if (fSnap.exists()) {
        const fd = fSnap.data();
        const oldRating = fd.rating || 0;
        const oldCount  = fd.ratingCount || 0;
        const newCount  = oldCount + 1;
        const newRating = ((oldRating * oldCount) + selectedStars) / newCount;
        await updateDoc(doc(db,'users',job.assignedTo), {
          rating: Math.round(newRating * 10) / 10,
          ratingCount: newCount
        });
      }
    }

    // Job-a reviewLeft qoy (ikinci defe yazmasin)
    await updateDoc(doc(db,'jobs',jobId), { reviewLeft: true });

    showToast('Reyiniz gonderildi! Teshekkurler &#x2B50;');
    load();
  } catch(e){ showToast('Xeta: '+e.message); }
};

window.skipReview = async function() {
  const { db, doc, updateDoc } = FB;
  try {
    await updateDoc(doc(db,'jobs',jobId), { reviewLeft: true });
    load();
  } catch(e){}
};

// ===== DISPUTE CHAT =====
function subscribeDispute() {
  if (unsubDispute) unsubDispute();
  const q = fsQuery(fsCol(FB.db,'jobs',jobId,'dispute_messages'), orderBy('at','asc'));
  unsubDispute = onSnapshot(q, snap => {
    const el = document.getElementById('dispute-chat');
    if (!el) return;
    const msgs = [];
    snap.forEach(d => msgs.push({ id:d.id, ...d.data() }));
    if (!msgs.length) {
      el.innerHTML = '<div style="text-align:center;color:var(--ink3);font-size:13px;padding:12px;">Hec bir mesaj yoxdur. Birincini siz yazin.</div>';
      return;
    }
    el.innerHTML = msgs.map(m => {
      const isMe = FB.user && m.uid === FB.user.uid;
      const isAdm = m.role === 'admin';
      const cls = isAdm ? 'admin-msg' : isMe ? 'mine' : 'other';
      return '<div class="dc-msg ' + cls + '">'
        + (isAdm ? '&#x1F451; <b>Admin: </b>' : '<b>' + esc(m.name) + ':</b> ')
        + esc(m.text)
        + '<div class="dc-meta">' + (m.at ? new Date(m.at.seconds*1000).toLocaleString('az',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}) : '') + '</div>'
        + '</div>';
    }).join('');
    el.scrollTop = el.scrollHeight;
  });
}

window.sendDisputeMsg = async function() {
  const inp = document.getElementById('dc-input');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  try {
    await fsAdd(fsCol(FB.db,'jobs',jobId,'dispute_messages'), {
      text,
      uid: FB.user.uid,
      name: FB.userData?.name || FB.user.email.split('@')[0],
      role: FB.userData?.role || 'user',
      at: fsST()
    });
  } catch(e){ showToast('Gonderilmedi: '+e.message); }
};

window.resolveDispute = async function() {
  const resolution = prompt('Qerari yazin (musteri ve freelancer gorur):');
  if (!resolution) return;
  const { db, doc, updateDoc } = FB;
  try {
    await fsAdd(fsCol(FB.db,'jobs',jobId,'dispute_messages'), {
      text: resolution,
      uid: FB.user.uid,
      name: 'Admin',
      role: 'admin',
      at: fsST()
    });
    if (confirm('Ishi tamamlandi kimi qeyd etmek? (OK = Tamamlandi, Legv = Ipttal)')) {
      await updateDoc(doc(db,'jobs',jobId), { status:'completed', completedAt: new Date() });
      showToast('Is tamamlandi kimi qeyd edildi.');
    } else {
      await updateDoc(doc(db,'jobs',jobId), { status:'cancelled' });
      showToast('Is ipttal edildi.');
    }
    load();
  } catch(e){ showToast('Xeta: '+e.message); }
};
</script>
