<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Əlaqə — Freelan.az</title>
<meta name="description" content="Freelan.az ilə əlaqə — sual, təklif və ya problemlə bağlı bizə yazın, tezliklə cavab verək.">
<meta property="og:title" content="Əlaqə — Freelan.az">
<meta property="og:description" content="Freelan.az ilə əlaqə — sual, təklif və ya problemlə bağlı bizə yazın, tezliklə cavab verək.">
<meta property="og:url" content="https://samir210-az.github.io/freelan/contact.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Freelan.az">
<meta property="og:image" content="https://samir210-az.github.io/freelan/icon-512.png">
<meta property="og:locale" content="az_AZ">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Əlaqə — Freelan.az">
<meta name="twitter:description" content="Freelan.az ilə əlaqə — sual, təklif və ya problemlə bağlı bizə yazın, tezliklə cavab verək.">
<meta name="theme-color" content="#0d1f12">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<script>document.documentElement.setAttribute("data-theme","light");</script>
<link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>

<header id="app-header"></header>

<div class="container" style="max-width:640px;">
  <div class="page-head" style="text-align:center;">
    <h1 data-i18n="ct_h">Əlaqə 📬</h1>
    <p data-i18n="ct_s">Sual, təklif və ya problemlə bağlı bizə yazın</p>
  </div>

  <div class="jd-card" style="margin:28px 0 70px;">
    <div class="form-group"><label class="form-label" data-i18n="ct_name">Adınız</label>
      <input class="form-input" id="ct-name" placeholder="Adınız Soyadınız"></div>
    <div class="form-group"><label class="form-label" data-i18n="au_email">E-poçt</label>
      <input class="form-input" id="ct-email" type="email" placeholder="sizin@email.com"></div>
    <div class="form-group"><label class="form-label" data-i18n="ct_subject">Mövzu</label>
      <select class="form-select" id="ct-subject">
        <option>Ümumi sual</option><option>Texniki problem</option>
        <option>Ödəniş məsələsi</option><option>Şikayət</option>
        <option>Əməkdaşlıq təklifi</option>
      </select></div>
    <div class="form-group"><label class="form-label" data-i18n="ct_msg">Mesajınız</label>
      <textarea class="form-textarea" id="ct-msg" data-i18n-ph="ct_msg_ph" placeholder="Mesajınızı yazın..."></textarea></div>
    <div id="ct-err" class="err-box"></div>
    <div id="ct-ok" class="ok-box"></div>
    <button class="btn btn-green" id="ct-btn" style="width:100%;" data-i18n="ct_send" onclick="sendContact()">Göndər 📨</button>
  </div>
</div>

<footer id="app-footer"></footer>

<script type="module" src="js/app.js?v=8"></script>
<script type="module">
window.sendContact = async function() {
  const name = document.getElementById('ct-name').value.trim();
  const email = document.getElementById('ct-email').value.trim();
  const subject = document.getElementById('ct-subject').value;
  const msg = document.getElementById('ct-msg').value.trim();
  if (!name || !email || !msg) { fbErr('ct-err', t('ct_fill')); return; }
  fbErrClear('ct-err');
  const btn = document.getElementById('ct-btn');
  btn.disabled = true; btn.textContent = '⏳ Göndərilir...';
  const { db, collection, addDoc, serverTimestamp } = FB;
  try {
    await addDoc(collection(db, 'contacts'), {
      name, email, subject, message: msg,
      userId: FB.user?.uid || null,
      createdAt: serverTimestamp()
    });
    const ok = document.getElementById('ct-ok');
    ok.textContent = t('ct_ok');
    ok.style.display = 'block';
    ['ct-name','ct-email','ct-msg'].forEach(id => document.getElementById(id).value = '');
  } catch(e) {
    fbErr('ct-err', 'Xəta: ' + e.message);
  }
  btn.disabled = false; btn.textContent = t('ct_send');
};
</script>
</body>
</html>
