<script>try{var th=localStorage.getItem("theme");if(!th&&window.matchMedia&&matchMedia("(prefers-color-scheme:dark)").matches)th="dark";if(th)document.documentElement.setAttribute("data-theme",th);}catch(e){}</script>
<link rel="stylesheet" href="css/style.css?v=5">
<style>
.bubble {
  position: relative;
  padding-right: 28px !important;
}
.bubble.b-in {
  padding-right: 12px !important;
}
.msg-del {
  position: absolute;
  top: 50%;
  right: 4px;
  transform: translateY(-50%);
  background: rgba(220,50,50,0.75);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  font-size: 15px;
  line-height: 22px;
  text-align: center;
  cursor: pointer;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.msg-del:hover { background: rgba(200,20,20,1); }
</style>
</head>
<body>

<header id="app-header"></header>

<div class="msg-grid" id="msg-wrap" style="display:none;">
  <aside class="msg-side" id="contacts">
    <div class="empty"><div class="ico">&#x23F3;</div><p>Y&#xFC;kl&#x259;nir...</p></div>
  </aside>
  <main class="msg-main">
    <div class="msg-head" id="chat-head">
      <span style="color:var(--ink3);font-size:14px;" data-i18n="ms_pick">S&#xF6;hb&#x259;t se&#xE7;in</span>
    </div>
    <div class="msg-list" id="chat-list">
      <div class="empty"><div class="ico">&#x1F4AC;</div><p data-i18n="ms_pick2">S&#xF6;hb&#x259;t ba&#x15F;latmaq &#xFC;&#xE7;&#xFC;n sol t&#x259;r&#x259;fd&#x259;n kontakt se&#xE7;in</p></div>
    </div>
    <div class="msg-input-row" id="chat-input-row" style="display:none;">
      <input type="text" id="msg-text" data-i18n-ph="ms_ph" placeholder="Mesaj yaz&#x131;n..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="btn btn-green" data-i18n="ms_send" onclick="sendMsg()">G&#xF6;nd&#x259;r</button>
    </div>
  </main>
</div>

<div id="auth-required" class="container" style="display:none;">
  <div class="empty" style="padding:100px 20px;">
    <div class="ico">&#x1F510;</div>
    <p style="margin-bottom:18px;" data-i18n="ms_auth">Mesajlara baxmaq &#xFC;&#xE7;&#xFC;n hesab&#x131;n&#x131;za daxil olun</p>
    <button class="btn btn-green" data-i18n="login" onclick="openAuth('login')">Daxil ol</button>
  </div>
</div>

<footer id="app-footer"></footer>

<script type="module" src="js/app.js?v=8"></script>
<script type="module">
import {
  onSnapshot,
  orderBy,
  query as fsQuery,
  collection as fsCollection,
  where as fsWhere,
  deleteDoc,
  doc as fsDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let activeChatId = null;
let unsub = null;
let unsubContacts = null;
let chatsCache = [];
let didAutoOpen = false;

document.addEventListener('fb-ready', init);

async function init() {
  if (!FB.user) {
    document.getElementById('auth-required').style.display = 'block';
    return;
  }
  document.getElementById('msg-wrap').style.display = 'grid';
  subscribeContacts();
}

function readKey(chatId) { return 'read_' + chatId + '_' + FB.user.uid; }
function lastReadSec(chatId) { return Number(localStorage.getItem(readKey(chatId)) || 0); }
function markRead(chatId, sec) { localStorage.setItem(readKey(chatId), String(sec || Math.floor(Date.now()/1000))); }

function subscribeContacts() {
  const el = document.getElementById('contacts');
  const q = fsQuery(fsCollection(FB.db, 'chats'), fsWhere('members', 'array-contains', FB.user.uid));
  if (unsubContacts) unsubContacts();
  unsubContacts = onSnapshot(q, snap => {
    chatsCache = [];
    snap.forEach(d => chatsCache.push({ id: d.id, ...d.data() }));
    chatsCache.sort((a,b) => (b.lastAt?.seconds||0) - (a.lastAt?.seconds||0));
    renderContacts();
    if (!didAutoOpen) {
      didAutoOpen = true;
      const want = new URLSearchParams(location.search).get('chat');
      if (want) {
        const c = chatsCache.find(x => x.id === want);
        if (c) openChat(c.id, otherNameOf(c));
      }
    }
  }, err => {
    el.innerHTML = '<div class="empty"><div class="ico">&#x26A0;</div><p style="font-size:12px;">' + esc(err.message) + '</p></div>';
  });
}

function otherNameOf(c) {
  return c.memberNames?.[c.members.find(m => m !== FB.user.uid)] || t('user_lbl');
}

function renderContacts() {
  const el = document.getElementById('contacts');
  if (!chatsCache.length) {
    el.innerHTML = '<div class="empty"><div class="ico">&#x1F4AC;</div><p style="font-size:13px;">' + t('ms_none') + '</p></div>';
    return;
  }
  el.innerHTML = chatsCache.map(c => {
    const otherName = otherNameOf(c);
    const isUnread = c.lastFrom && c.lastFrom !== FB.user.uid
      && c.id !== activeChatId
      && (c.lastAt?.seconds || 0) > lastReadSec(c.id);
    return '<div class="msg-contact ' + (c.id===activeChatId?'active':'') + ' ' + (isUnread?'unread':'') + '" data-chat="' + c.id + '" onclick="openChat(\'' + c.id + '\',\'' + esc(otherName) + '\')">'
      + '<div class="avatar">' + esc(otherName[0].toUpperCase()) + '</div>'
      + '<div style="min-width:0;flex:1;">'
      + '<div class="nm">' + esc(otherName) + '</div>'
      + '<div class="lst">' + esc(c.lastMsg || '') + '</div>'
      + '</div>'
      + (isUnread ? '<span class="unread-dot"></span>' : '')
      + '</div>';
  }).join('');
}

window.openChat = function(chatId, name) {
  activeChatId = chatId;
  const c = chatsCache.find(x => x.id === chatId);
  markRead(chatId, c?.lastAt?.seconds);
  renderContacts();
  document.getElementById('chat-head').innerHTML = '<div class="avatar">' + esc(name[0].toUpperCase()) + '</div><b>' + esc(name) + '</b>';
  document.getElementById('chat-input-row').style.display = 'flex';

  if (unsub) unsub();
  const q = fsQuery(fsCollection(FB.db, 'chats', chatId, 'messages'), orderBy('at', 'asc'));
  unsub = onSnapshot(q, snap => {
    const list = document.getElementById('chat-list');
    const msgs = [];
    snap.forEach(d => msgs.push({ id: d.id, ...d.data() }));
    if (!msgs.length) {
      list.innerHTML = '<div class="empty"><div class="ico">&#x1F44B;</div><p>' + t('ms_first') + '</p></div>';
      return;
    }
    list.innerHTML = msgs.map(function(m) {
      var isOwn = m.from === FB.user.uid;
      var delBtn = isOwn
        ? '<button class="msg-del" onclick="delMsg(\'' + m.id + '\')" title="Sil">&#x2715;</button>'
        : '';
      return '<div class="bubble ' + (isOwn ? 'b-out' : 'b-in') + '">' + esc(m.text) + delBtn + '</div>';
    }).join('');
    list.scrollTop = list.scrollHeight;
    var last = msgs[msgs.length - 1];
    if (last && last.at && last.at.seconds) markRead(chatId, last.at.seconds);
  });
};

window.delMsg = async function(msgId) {
  if (!activeChatId || !msgId) return;
  if (!confirm('Bu mesajı silmək istəyirsiniz?')) return;
  try {
    await deleteDoc(fsDoc(FB.db, 'chats', activeChatId, 'messages', msgId));
  } catch(e) {
    alert('Silinmedi: ' + e.message);
  }
};

window.sendMsg = async function() {
  const input = document.getElementById('msg-text');
  const text = input.value.trim();
  if (!text || !activeChatId) return;
  input.value = '';
  const { db, collection, addDoc, doc, updateDoc, serverTimestamp } = FB;
  try {
    await addDoc(collection(db, 'chats', activeChatId, 'messages'), {
      from: FB.user.uid, text, at: serverTimestamp()
    });
    await updateDoc(doc(db, 'chats', activeChatId), {
      lastMsg: text, lastAt: serverTimestamp(), lastFrom: FB.user.uid
    });
    markRead(activeChatId);
  } catch(e) { alert('Gonderilmedi: ' + e.message); }
};
</script>
</body>
</html>
