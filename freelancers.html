<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Freelancerlər — Freelan.az</title>
<meta name="description" content="Azərbaycanın ən yaxşı freelancerlərini tap — dizaynerlər, developerlər, kopirayterlər. Reytinq və rəylərə bax, birbaşa əlaqə saxla.">
<meta property="og:title" content="Freelancerlər — Freelan.az">
<meta property="og:description" content="Azərbaycanın ən yaxşı freelancerlərini tap — dizaynerlər, developerlər, kopirayterlər. Reytinq və rəylərə bax, birbaşa əlaqə saxla.">
<meta property="og:url" content="https://samir210-az.github.io/freelan/freelancers.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Freelan.az">
<meta property="og:image" content="https://samir210-az.github.io/freelan/icon-512.png">
<meta property="og:locale" content="az_AZ">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Freelancerlər — Freelan.az">
<meta name="twitter:description" content="Azərbaycanın ən yaxşı freelancerlərini tap — dizaynerlər, developerlər, kopirayterlər. Reytinq və rəylərə bax, birbaşa əlaqə saxla.">
<meta name="theme-color" content="#0d1f12">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>

<header id="app-header"></header>

<div class="container">
  <div class="page-head">
    <h1 data-i18n="fl_h">Freelancerlər</h1>
    <p id="fl-count" data-i18n="loading">Yüklənir...</p>
  </div>

  <div class="searchbar" style="margin-top:20px;">
    <input type="text" id="search-q" data-i18n-ph="fl_q_ph" placeholder="Ad və ya ixtisas üzrə axtar..." onkeydown="if(event.key==='Enter')applyFilter()" oninput="if(!this.value)applyFilter()">
    <button class="btn btn-green" data-i18n="search" onclick="applyFilter()">Axtar</button>
  </div>

  <div class="grid-4" id="fl-grid" style="padding-bottom:60px;">
    <div class="empty" style="grid-column:1/-1;"><div class="ico">⏳</div><p data-i18n="loading">Yüklənir...</p></div>
  </div>
</div>

<footer id="app-footer"></footer>

<script type="module" src="js/app.js?v=6"></script>
<script type="module">
let all = [];
document.addEventListener('fb-ready', load);

let loading = false;
async function load() {
  if (loading) return; loading = true;
  const { db, collection, getDocs, query, where, limit } = FB;
  try {
    const snap = await getDocs(query(collection(db, 'users'), where('role','==','freelancer'), limit(100)));
    all = [];
    snap.forEach(d => { const u = d.data(); if (u.status !== 'banned') all.push({ id: d.id, ...u }); });
    all.sort((a,b) => ((b.plan==='pro')-(a.plan==='pro')) || (b.rating||0) - (a.rating||0));
    applyFilter();
  } catch(e) {
    document.getElementById('fl-grid').innerHTML = '<div class="empty" style="grid-column:1/-1;"><div class="ico">⚠️</div><p>Yüklənmədi: ' + esc(e.message) + '</p></div>';
  }
  loading = false;
}

window.applyFilter = function() {
  const kw = azLower(document.getElementById('search-q').value.trim());
  const list = kw
    ? all.filter(f => azLower(f.name).includes(kw) || azLower(f.title).includes(kw) || azLower((f.skills||[]).join(' ')).includes(kw))
    : all;
  document.getElementById('fl-count').textContent = list.length + ' ' + t('fl_word');
  const el = document.getElementById('fl-grid');
  el.innerHTML = list.length
    ? list.map(f => `
      <div class="fl-card" onclick="location.href='profile.html?id=${f.id}'">
        <div class="avatar">${esc((f.name||'?')[0].toUpperCase())}</div>
        <h3>${esc(f.name)} ${planBadge(f.plan)}</h3>
        <div class="role">${esc(f.title || 'Freelancer')}</div>
        <div class="stars">★ ${f.rating > 0 ? f.rating.toFixed(1) : t('new_lbl')} · ${f.jobsDone||0} ${t('work_s')}</div>
        ${(f.skills||[]).length ? `<div class="tags" style="justify-content:center;margin-top:10px;">${f.skills.slice(0,3).map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>` : ''}
        ${f.rate > 0 ? `<div class="rate">₼${f.rate}${t('per_hour')}</div>` : ''}
      </div>`).join('')
    : '<div class="empty" style="grid-column:1/-1;"><div class="ico">🔍</div><p>'+t('no_results')+'</p></div>';
};
</script>
</body>
</html>
