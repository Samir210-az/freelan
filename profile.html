<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profil — Freelan.az</title>
<meta name="description" content="Freelancer profili — bacarıqlar, reytinq, rəylər və tamamlanmış işlər.">
<meta property="og:title" content="Profil — Freelan.az">
<meta property="og:description" content="Freelancer profili — bacarıqlar, reytinq, rəylər və tamamlanmış işlər.">
<meta property="og:url" content="https://samir210-az.github.io/freelan/profile.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Freelan.az">
<meta property="og:image" content="https://samir210-az.github.io/freelan/icon-512.png">
<meta property="og:locale" content="az_AZ">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Profil — Freelan.az">
<meta name="twitter:description" content="Freelancer profili — bacarıqlar, reytinq, rəylər və tamamlanmış işlər.">
<meta name="theme-color" content="#0d1f12">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<script>try{var th=localStorage.getItem("theme");if(!th&&window.matchMedia&&matchMedia("(prefers-color-scheme:dark)").matches)th="dark";if(th)document.documentElement.setAttribute("data-theme",th);}catch(e){}</script>
<link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>

<header id="app-header"></header>

<div class="container" style="max-width:860px;">
  <div id="profile-wrap" style="padding:36px 0 70px;">
    <div class="empty"><div class="ico">⏳</div><p data-i18n="loading">Yüklənir...</p></div>
  </div>
</div>

<footer id="app-footer"></footer>

<script type="module" src="js/app.js?v=10"></script>
<script type="module">
// profile.html ?id=UID  OR  ?uid=UID  (admin paneldən gələn link)
const uid = new URLSearchParams(location.search).get('id') || new URLSearchParams(location.search).get('uid');
document.addEventListener('fb-ready', load);

let loading = false;
async function load() {
  if (loading) return; loading = true;
  const el = document.getElementById('profile-wrap');
  if (!uid) { el.innerHTML = '<div class="empty"><div class="ico">😕</div><p>'+t('pf_nf')+'</p></div>'; loading = false; return; }
  const { db, doc, getDoc, collection, getDocs, query, where } = FB;
  try {
    const snap = await getDoc(doc(db, 'users', uid));
    if (!snap.exists()) { el.innerHTML = '<div class="empty"><div class="ico">😕</div><p>'+t('pf_nf')+'</p></div>'; loading = false; return; }
    const u = snap.data();
    document.title = (u.name || 'Profil') + ' — Freelan.az';

    // === Rəylər ===
    let reviewsHtml = '';
    let revCount = 0;
    try {
      const rs = await getDocs(query(collection(db, 'reviews'), where('freelancerId', '==', uid)));
      const revs = [];
      rs.forEach(d => revs.push(d.data()));
      revs.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
      revCount = revs.length;
      if (revs.length) {
        reviewsHtml = `<div class="jd-card" style="margin-top:18px;">
          <h3 style="font-size:16px;margin-bottom:14px;">${t('pf_reviews')} (${revs.length})</h3>
          ${revs.map(r => `
          <div class="prop-item">
            <div class="prop-head">
              <div style="display:flex;gap:10px;align-items:center;">
                <div class="avatar">${esc((r.clientName||'?')[0].toUpperCase())}</div>
                <div>
                  <div class="prop-name">${esc(r.clientName||t('db_client'))}</div>
                  <div class="prop-meta" style="color:#f5a623;">${'★'.repeat(clampStars(r.rating))}<span style="color:#ddd;">${'★'.repeat(5-clampStars(r.rating))}</span> <span style="color:var(--ink3);">· ${timeAgo(r.createdAt)}</span></div>
                </div>
              </div>
            </div>
            ${(r.comment||r.text) ? `<p class="prop-cover">${esc(r.comment||r.text)}</p>` : ''}
          </div>`).join('')}
        </div>`;
      }
    } catch(e) {}

    // === Tamamlanan işlər (freelancer üçün) ===
    let completedJobsHtml = '';
    if (u.role === 'freelancer') {
      try {
        const js = await getDocs(query(collection(db, 'jobs'),
          where('assignedTo', '==', uid), where('status', '==', 'completed')));
        const cjobs = [];
        js.forEach(d => cjobs.push({ id: d.id, ...d.data() }));
        cjobs.sort((a,b) => (b.completedAt?.seconds||b.createdAt?.seconds||0) - (a.completedAt?.seconds||a.createdAt?.seconds||0));
        if (cjobs.length) {
          completedJobsHtml = `<div class="jd-card" style="margin-top:18px;">
            <h3 style="font-size:16px;margin-bottom:14px;">✅ Tamamlanan işlər (${cjobs.length})</h3>
            ${cjobs.slice(0,6).map(j => `
            <div class="prop-item" style="cursor:pointer;" onclick="location.href='job.html?id=${j.id}'">
              <div class="prop-head">
                <div style="flex:1;">
                  <div class="prop-name">${esc(j.title)}</div>
                  <div class="prop-meta">📁 ${esc(j.category)} · ${timeAgo(j.completedAt||j.createdAt)}</div>
                </div>
                <div style="text-align:right;flex-shrink:0;">
                  <div class="prop-amount">₼${j.budget}</div>
                  <span class="badge badge-gray">Tamamlandı</span>
                </div>
              </div>
            </div>`).join('')}
            ${cjobs.length > 6 ? `<div style="text-align:center;padding-top:10px;font-size:13px;color:var(--ink3);">+ ${cjobs.length-6} iş daha</div>` : ''}
          </div>`;
        }
      } catch(e) {}
    }

    // === Aktiv iş statusu ===
    let activeJobsHtml = '';
    if (u.role === 'freelancer') {
      try {
        const aj = await getDocs(query(collection(db, 'jobs'),
          where('assignedTo', '==', uid), where('status', '==', 'in_progress')));
        const acount = aj.size;
        if (acount > 0) {
          activeJobsHtml = `<div style="background:rgba(20,160,0,.08);border:1px solid rgba(20,160,0,.2);border-radius:10px;padding:10px 16px;margin-top:12px;font-size:13px;color:var(--green);font-weight:600;">🔄 ${acount} aktiv iş davam edir</div>`;
        }
      } catch(e) {}
    }

    const isOwnProfile = FB.user && FB.user.uid === uid;
    const isAdmin = FB.userData?.role === 'admin';

    el.innerHTML = `
    <div class="jd-card" style="text-align:center;padding:40px 24px;">
      <div class="avatar" style="width:88px;height:88px;font-size:32px;margin:0 auto 16px;">${avaInner(u.photo, u.name)}</div>
      <h1 style="font-size:26px;">${esc(u.name||'—')} ${planBadge(u.plan)}</h1>
      <p style="color:var(--ink2);margin:4px 0 8px;">${esc(u.title || (u.role === 'freelancer' ? 'Freelancer' : t('db_client')))}</p>
      <div style="font-size:14px;color:var(--ink3);margin-bottom:8px;">
        ${u.role === 'freelancer' ? '🧑‍💻 Freelancer' : '💼 ' + t('db_client')}
        ${u.status === 'banned' ? ' · <span style="color:#d23232;">🚫 Bloklanıb</span>' : ''}
      </div>
      <div class="stars" style="font-size:15px;">★ ${u.rating > 0 ? u.rating.toFixed(1) : t('new_lbl')} · ${u.jobsDone||0} ${t('pf_done')} · ${revCount} rəy</div>
      ${u.rate > 0 ? `<div style="font-size:22px;font-weight:800;color:var(--green);margin-top:12px;">₼${u.rate}${t('per_hour')}</div>` : ''}
      ${(u.skills||[]).length ? `<div class="tags" style="justify-content:center;margin-top:16px;">${u.skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>` : ''}
      ${activeJobsHtml}
      <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;">
        ${!isOwnProfile ? `<button class="btn btn-green" onclick="openMessage('${uid}','${esc(u.name||'')}')">${t('msg_send')}</button>` : ''}
        ${isOwnProfile ? `<a class="btn btn-green" href="dashboard.html">⚙️ Profili düzəlt</a>` : ''}
        ${isAdmin ? `<a class="btn btn-line btn-sm" href="admin.html">👑 Admin panel</a>` : ''}
      </div>
    </div>
    ${u.bio ? `
    <div class="jd-card" style="margin-top:18px;">
      <h3 style="font-size:16px;margin-bottom:10px;">${t('pf_about')}</h3>
      <p style="font-size:14.5px;color:var(--ink2);line-height:1.7;white-space:pre-wrap;">${esc(u.bio)}</p>
    </div>` : ''}
    ${completedJobsHtml}
    ${reviewsHtml}
    <div style="text-align:center;margin-top:24px;">
      <a class="btn btn-line" href="freelancers.html">${t('pf_all')}</a>
    </div>`;
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="ico">⚠️</div><p>Xəta: ' + esc(e.message) + '</p></div>';
  }
  loading = false;
}
</script>
</body>
</html>
